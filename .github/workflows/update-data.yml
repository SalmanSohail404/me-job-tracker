name: Update job data

on:
  schedule:
    # Runs every day at 05:00 UTC (~10:00 AM Pakistan time)
    - cron: '0 5 * * *'
  workflow_dispatch: {}   # allows manual run from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Commit updated data
        run: |
          git config user.name "job-tracker-bot"
          git config user.email "actions@github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "Update job data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
